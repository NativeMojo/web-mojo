<!doctype html>
<html lang="en" data-bs-theme="corporate">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>web-mojo — Examples Portal</title>

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        />

        <!-- Core stylesheets (core / portal / table / toast / chat) come
             through `import 'web-mojo'` in app.js — see src/index.js.
             Loading them via <link> too caused every rule to register twice
             in the cascade. Extension CSS for dynamically-loaded examples
             (charts, lightbox, auth) is still pre-linked here so styles
             apply before the dynamic import resolves. -->
        <link href="/src/extensions/charts/css/charts.css" rel="stylesheet" />
        <link href="/src/extensions/lightbox/css/lightbox.css" rel="stylesheet" />
        <link href="/src/extensions/auth/css/auth.css" rel="stylesheet" />

        <link rel="stylesheet" href="app.css" />
    </head>
    <body class="mojo-loader-theme-light">
        <div id="app"></div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script type="module" src="app.js"></script>
    </body>
</html>
