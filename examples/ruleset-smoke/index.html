<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RuleSetView smoke</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { padding: 1rem; }
        .smoke-toolbar { display: flex; gap: 0.5rem; margin-bottom: 1rem; align-items: center; }
        .smoke-shell { max-width: 1240px; margin: 0 auto; border: 1px solid var(--bs-border-color); border-radius: 0.5rem; overflow: hidden; min-height: 700px; background: var(--bs-body-bg); }
    </style>
</head>
<body>
    <div class="smoke-toolbar">
        <button class="btn btn-outline-secondary btn-sm" id="theme-toggle">Toggle theme</button>
        <strong>RuleSetView smoke test</strong>
        <span class="text-body-secondary small">— synthetic data, no backend</span>
    </div>
    <div class="smoke-shell" id="host"></div>

    <script type="module" src="./app.js"></script>
</body>
</html>
