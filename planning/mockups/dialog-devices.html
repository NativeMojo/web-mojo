<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Devices Dialog</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #f5f6fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .dialog-mock { width: 520px; background: #fff; border-radius: 12px; box-shadow: 0 8px 40px rgba(0,0,0,0.15); overflow: hidden; }
    .dialog-header { display: flex; align-items: center; padding: 1rem 1.25rem; border-bottom: 1px solid #e9ecef; }
    .dialog-header h6 { margin: 0; font-weight: 700; font-size: 0.95rem; flex: 1; }
    .dialog-header .btn-close-dlg { background: none; border: none; color: #6c757d; font-size: 1rem; cursor: pointer; padding: 0.2rem 0.4rem; border-radius: 4px; }
    .dialog-header .btn-close-dlg:hover { background: #f0f0f0; }
    .dialog-body { padding: 1.25rem; max-height: 400px; overflow-y: auto; }

    .dev-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 0.75rem; border: 1px solid #f0f0f0; border-radius: 8px; margin-bottom: 0.4rem; }
    .dev-icon { width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; flex-shrink: 0; background: #f0f0f0; color: #495057; }
    .dev-info { flex: 1; }
    .dev-name { font-weight: 600; font-size: 0.85rem; }
    .dev-meta { font-size: 0.73rem; color: #6c757d; }
  </style>
</head>
<body>

<div class="dialog-mock">
  <div class="dialog-header">
    <h6><i class="bi bi-laptop me-2"></i>Devices</h6>
    <button class="btn-close-dlg"><i class="bi bi-x-lg"></i></button>
  </div>
  <div class="dialog-body">

    <div class="dev-row">
      <div class="dev-icon"><i class="bi bi-laptop"></i></div>
      <div class="dev-info">
        <div class="dev-name">MacBook Pro 16"</div>
        <div class="dev-meta">macOS Sequoia &middot; Registered Oct 2025 &middot; Last seen 2 min ago</div>
      </div>
    </div>

    <div class="dev-row">
      <div class="dev-icon"><i class="bi bi-phone"></i></div>
      <div class="dev-info">
        <div class="dev-name">iPhone 15 Pro</div>
        <div class="dev-meta">iOS 19 &middot; Registered Jan 2026 &middot; Last seen 3 hours ago</div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
