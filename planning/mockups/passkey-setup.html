<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passkey Setup Prompt</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; min-height: 100vh; }

    /* Compact Dialog — shown in Dialog (sm size) */
    .setup-dialog { width: 380px; background: #fff; border-radius: 12px; box-shadow: 0 8px 40px rgba(0,0,0,0.15); overflow: hidden; }
    .setup-body { padding: 2rem 1.75rem 1rem; text-align: center; }
    .setup-icon { width: 56px; height: 56px; background: #e7f1ff; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 1.5rem; color: #0d6efd; margin-bottom: 1rem; }
    .setup-body h5 { font-weight: 700; font-size: 1.05rem; margin-bottom: 0.35rem; }
    .setup-body p { font-size: 0.83rem; color: #6c757d; margin-bottom: 1.25rem; line-height: 1.45; }
    .setup-footer { padding: 0 1.75rem 1.5rem; display: flex; flex-direction: column; gap: 0.4rem; }
    .setup-footer .btn-create { padding: 0.6rem; font-weight: 600; font-size: 0.9rem; border-radius: 8px; }
    .setup-footer .btn-skip { background: none; border: none; color: #6c757d; font-size: 0.82rem; padding: 0.4rem; cursor: pointer; }
    .setup-footer .btn-skip:hover { color: #495057; }
    .dont-show { text-align: center; padding: 0 1.75rem 1.25rem; }
    .dont-show label { font-size: 0.73rem; color: #adb5bd; cursor: pointer; }
  </style>
</head>
<body>

<div class="setup-dialog">
  <div class="setup-body">
    <div class="setup-icon"><i class="bi bi-fingerprint"></i></div>
    <h5>Add a Passkey</h5>
    <p>Sign in faster with Face ID, Touch ID, or your device PIN. No passwords needed.</p>
  </div>
  <div class="setup-footer">
    <button class="btn btn-primary btn-create"><i class="bi bi-fingerprint me-1"></i>Create Passkey</button>
    <button class="btn-skip">Not now</button>
  </div>
  <div class="dont-show">
    <label><input type="checkbox" class="form-check-input form-check-input-sm me-1"> Don't ask again</label>
  </div>
</div>

</body>
</html>
