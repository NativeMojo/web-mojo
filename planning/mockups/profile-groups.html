<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile - Groups</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #f5f6fa; margin: 0; }
    .profile-modal { position: fixed; inset: 0; background: #fff; display: flex; flex-direction: column; z-index: 1050; }
    .profile-topbar { height: 48px; border-bottom: 1px solid #e9ecef; display: flex; align-items: center; padding: 0 1rem; gap: 0.75rem; flex-shrink: 0; }
    .profile-topbar h6 { margin: 0; font-weight: 600; font-size: 0.9rem; flex: 1; }
    .profile-topbar .btn-close-profile { background: none; border: none; font-size: 1.1rem; color: #6c757d; cursor: pointer; padding: 0.25rem 0.5rem; border-radius: 4px; }
    .profile-topbar .btn-close-profile:hover { background: #f0f0f0; color: #212529; }
    .profile-body { display: flex; flex: 1; overflow: hidden; }
    .profile-nav { width: 200px; background: #f8f9fc; border-right: 1px solid #e9ecef; padding: 1rem 0; flex-shrink: 0; }
    .profile-nav .nav-link { color: #495057; padding: 0.5rem 1.25rem; font-size: 0.85rem; display: flex; align-items: center; gap: 0.5rem; text-decoration: none; }
    .profile-nav .nav-link:hover { background: #e9ecef; }
    .profile-nav .nav-link.active { background: #e7f1ff; color: #0d6efd; font-weight: 600; border-right: 2px solid #0d6efd; }
    .profile-nav .nav-link i { width: 18px; text-align: center; font-size: 0.9rem; }
    .profile-content { flex: 1; overflow-y: auto; padding: 2rem 3rem; max-width: 720px; }

    .section-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #adb5bd; margin-bottom: 0.5rem; }

    /* Group row — clean, minimal */
    .grp-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.65rem 0; border-bottom: 1px solid #f0f0f0; }
    .grp-row:last-child { border-bottom: none; }
    .grp-avatar { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; color: #fff; flex-shrink: 0; }
    .grp-info { flex: 1; }
    .grp-name { font-weight: 600; font-size: 0.88rem; }
    .grp-meta { font-size: 0.73rem; color: #6c757d; }
    .grp-role { font-size: 0.7rem; padding: 0.15em 0.5em; border-radius: 3px; }

    .empty-msg { color: #6c757d; font-size: 0.85rem; font-style: italic; padding: 1rem 0; }
  </style>
</head>
<body>

<div class="profile-modal">
  <div class="profile-topbar">
    <button class="btn-close-profile"><i class="bi bi-x-lg"></i></button>
    <h6>Account</h6>
    <div class="dropdown">
      <button class="btn-close-profile" data-bs-toggle="dropdown"><i class="bi bi-three-dots"></i></button>
      <ul class="dropdown-menu dropdown-menu-end" style="font-size: 0.85rem;">
        <li><a class="dropdown-item" href="#"><i class="bi bi-lock me-2"></i>Change Password</a></li>
        <li><a class="dropdown-item" href="#"><i class="bi bi-envelope me-2"></i>Update Email</a></li>
        <li><a class="dropdown-item" href="#"><i class="bi bi-phone me-2"></i>Update Phone</a></li>
      </ul>
    </div>
  </div>

  <div class="profile-body">
    <nav class="profile-nav">
      <a href="profile-overview.html" class="nav-link"><i class="bi bi-person"></i> Profile</a>
      <a href="profile-security.html" class="nav-link"><i class="bi bi-shield-lock"></i> Security</a>
      <a href="#" class="nav-link active"><i class="bi bi-people"></i> Groups</a>
      <a href="profile-permissions.html" class="nav-link"><i class="bi bi-shield-check"></i> Permissions</a>
    </nav>

    <div class="profile-content">

      <div class="section-label">Memberships</div>

      <div class="grp-row">
        <div class="grp-avatar" style="background: #667eea;">MV</div>
        <div class="grp-info">
          <div class="grp-name">MojoVerify</div>
          <div class="grp-meta">Organization &middot; 24 members</div>
        </div>
        <span class="grp-role badge bg-primary">Owner</span>
      </div>

      <div class="grp-row">
        <div class="grp-avatar" style="background: #f5576c;">EN</div>
        <div class="grp-info">
          <div class="grp-name">Engineering</div>
          <div class="grp-meta">Team &middot; 8 members</div>
        </div>
        <span class="grp-role badge bg-info">Admin</span>
      </div>

      <div class="grp-row">
        <div class="grp-avatar" style="background: #38b2ac;">QA</div>
        <div class="grp-info">
          <div class="grp-name">QA & Testing</div>
          <div class="grp-meta">Team &middot; 5 members</div>
        </div>
        <span class="grp-role badge bg-secondary">Member</span>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
