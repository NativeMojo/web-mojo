<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passkeys Dialog</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #f5f6fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; }

    /* Simulating a Dialog (lg size) */
    .dialog-mock { width: 560px; background: #fff; border-radius: 12px; box-shadow: 0 8px 40px rgba(0,0,0,0.15); overflow: hidden; }
    .dialog-header { display: flex; align-items: center; padding: 1rem 1.25rem; border-bottom: 1px solid #e9ecef; }
    .dialog-header h6 { margin: 0; font-weight: 700; font-size: 0.95rem; flex: 1; }
    .dialog-header .btn-close-dlg { background: none; border: none; color: #6c757d; font-size: 1rem; cursor: pointer; padding: 0.2rem 0.4rem; border-radius: 4px; }
    .dialog-header .btn-close-dlg:hover { background: #f0f0f0; }
    .dialog-body { padding: 1.25rem; max-height: 420px; overflow-y: auto; }
    .dialog-footer { padding: 0.75rem 1.25rem; border-top: 1px solid #e9ecef; display: flex; justify-content: flex-end; gap: 0.5rem; }

    /* Passkey row — compact */
    .pk-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.65rem 0.75rem; border: 1px solid #f0f0f0; border-radius: 8px; margin-bottom: 0.4rem; }
    .pk-icon { width: 32px; height: 32px; background: #e7f1ff; border-radius: 6px; display: flex; align-items: center; justify-content: center; color: #0d6efd; font-size: 0.9rem; flex-shrink: 0; }
    .pk-info { flex: 1; min-width: 0; }
    .pk-name { font-weight: 600; font-size: 0.85rem; }
    .pk-meta { font-size: 0.73rem; color: #6c757d; }
    .pk-actions { display: flex; gap: 0.25rem; }
    .pk-actions .btn { padding: 0.2rem 0.4rem; font-size: 0.75rem; }

    .empty-state { text-align: center; padding: 2rem 1rem; color: #6c757d; }
    .empty-state i { font-size: 2rem; color: #ced4da; margin-bottom: 0.5rem; }
    .empty-state p { font-size: 0.85rem; margin: 0; }
  </style>
</head>
<body>

<!-- Passkeys Management Dialog -->
<div class="dialog-mock">
  <div class="dialog-header">
    <h6><i class="bi bi-fingerprint me-2"></i>Passkeys</h6>
    <button class="btn-close-dlg"><i class="bi bi-x-lg"></i></button>
  </div>
  <div class="dialog-body">

    <div class="pk-row">
      <div class="pk-icon"><i class="bi bi-fingerprint"></i></div>
      <div class="pk-info">
        <div class="pk-name">MacBook Pro - Touch ID</div>
        <div class="pk-meta">Created Jan 15 &middot; Last used 2 hours ago &middot; 47 uses</div>
      </div>
      <div class="pk-actions">
        <button class="btn btn-outline-secondary" title="Edit"><i class="bi bi-pencil"></i></button>
        <button class="btn btn-outline-danger" title="Delete"><i class="bi bi-trash"></i></button>
      </div>
    </div>

    <div class="pk-row">
      <div class="pk-icon"><i class="bi bi-fingerprint"></i></div>
      <div class="pk-info">
        <div class="pk-name">iPhone 15 Pro</div>
        <div class="pk-meta">Created Feb 20 &middot; Last used yesterday &middot; 12 uses</div>
      </div>
      <div class="pk-actions">
        <button class="btn btn-outline-secondary" title="Edit"><i class="bi bi-pencil"></i></button>
        <button class="btn btn-outline-danger" title="Delete"><i class="bi bi-trash"></i></button>
      </div>
    </div>

  </div>
  <div class="dialog-footer">
    <button class="btn btn-primary btn-sm"><i class="bi bi-plus-lg me-1"></i>Add Passkey</button>
  </div>
</div>

</body>
</html>
