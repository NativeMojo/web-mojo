<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sessions Dialog</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #f5f6fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .dialog-mock { width: 520px; background: #fff; border-radius: 12px; box-shadow: 0 8px 40px rgba(0,0,0,0.15); overflow: hidden; }
    .dialog-header { display: flex; align-items: center; padding: 1rem 1.25rem; border-bottom: 1px solid #e9ecef; }
    .dialog-header h6 { margin: 0; font-weight: 700; font-size: 0.95rem; flex: 1; }
    .dialog-header .btn-close-dlg { background: none; border: none; color: #6c757d; font-size: 1rem; cursor: pointer; padding: 0.2rem 0.4rem; border-radius: 4px; }
    .dialog-header .btn-close-dlg:hover { background: #f0f0f0; }
    .dialog-body { padding: 1.25rem; max-height: 400px; overflow-y: auto; }
    .dialog-footer { padding: 0.75rem 1.25rem; border-top: 1px solid #e9ecef; display: flex; justify-content: flex-end; }

    .sess-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 0.75rem; border: 1px solid #f0f0f0; border-radius: 8px; margin-bottom: 0.4rem; }
    .sess-icon { width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; flex-shrink: 0; background: #f0f0f0; color: #495057; }
    .sess-icon.current { background: #d1e7dd; color: #198754; }
    .sess-info { flex: 1; min-width: 0; }
    .sess-name { font-weight: 600; font-size: 0.85rem; display: flex; align-items: center; gap: 0.35rem; }
    .sess-meta { font-size: 0.73rem; color: #6c757d; }
    .badge-curr { font-size: 0.6rem; padding: 0.1em 0.35em; }
  </style>
</head>
<body>

<div class="dialog-mock">
  <div class="dialog-header">
    <h6><i class="bi bi-clock-history me-2"></i>Active Sessions</h6>
    <button class="btn-close-dlg"><i class="bi bi-x-lg"></i></button>
  </div>
  <div class="dialog-body">

    <div class="sess-row">
      <div class="sess-icon current"><i class="bi bi-laptop"></i></div>
      <div class="sess-info">
        <div class="sess-name">Chrome on macOS <span class="badge bg-success badge-curr">This device</span></div>
        <div class="sess-meta">Denver, CO &middot; 192.168.1.42 &middot; Active now</div>
      </div>
    </div>

    <div class="sess-row">
      <div class="sess-icon"><i class="bi bi-phone"></i></div>
      <div class="sess-info">
        <div class="sess-name">Safari on iOS</div>
        <div class="sess-meta">Denver, CO &middot; 10.0.0.15 &middot; 3 hours ago</div>
      </div>
      <button class="btn btn-sm btn-outline-danger" style="font-size: 0.73rem;">Revoke</button>
    </div>

  </div>
  <div class="dialog-footer">
    <button class="btn btn-outline-danger btn-sm">Revoke All Other Sessions</button>
  </div>
</div>

</body>
</html>
